---
- hosts: all
  become: yes
  become_method: sudo

  tasks:
    - name: Confirm dns does not exist in dhcpdc.conf
      lineinfile:
        state: present
        path: /etc/dhcpcd.conf
        line: "static domain_name_servers=192.168.1.1 8.8.8.8 8.8.4.4"
        backup: yes
   
    - name: Ensure GROUP_NAME exists in access.conf
      lineinfile:
        state: present
        path: /etc/security/access.conf
        line: "+ : (GROUP_NAME) : ALL"
        backup: yes

    - name: Update chrony.conf
      lineinfile:
        path: /etc/chrony.conf
        regexp: '^(.*)server(.*)$'
        line: 'server time1.google.com iburst'
        backrefs: yes
    
    - name: Add second time server
      lineinfile:
        path: /etc/chrony.conf
        regexp: 'server time1.google.com iburst'
        line: 'server time2.google.com iburst'
        insertafter: 'server time1.google.com iburst'
        state: present
        backup: yes
