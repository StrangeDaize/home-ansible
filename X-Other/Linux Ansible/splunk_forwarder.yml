---
- hosts: all
  become: yes
  become_method: sudo

  tasks:
  - name: pull rpm locally
    copy:
      src: /tmp/splunk/splunkforwarder-9.0.2.rpm
      dest: /tmp/splunkforwarder-9.0.2.rpm
      owner: ansible_func
      group: ansible_func
      mode: 0644
      remote_src: no

  - name: Import GnuPG Public Key for Splunk package
    rpm_key:
      key: https://docs.splunk.com/images/6/6b/SplunkPGPKey.pub
      state: present

  - name: Install Splunk Forwarder RPM package on remote servers.
    yum:
      name:
        #        - python3-pip
        - /tmp/splunkforwarder-9.0.2.rpm
      state: present

  - name: Install Splunk Forwarder RPM package on remote servers.
    pip:
      name:
        - pexpect
      state: present
      executable: pip3

  - name: Add server config
    copy:
      src: /tmp/splunk/local/
      dest: /opt/splunkforwarder/etc/system/local/
      owner: splunk 
      group: splunk
      mode: 0600
      remote_src: no

  - name: Start Splunk forwarder service.
    become_user: splunk
    expect:
      command: /opt/splunkforwarder/bin/splunk start --accept-license
      timeout: 60
      responses:
         (.*)Please enter an administrator username(.*): "splunk-admin"
         (.*)Please enter a new password(.*): "splunk234"
         (.*)Please confirm new password(.*): "splunk234"

  - name: Check Splunk forwarder service.
    command:
      /opt/splunkforwarder/bin/splunk status
    register: service_splunk_status

  - name: Report Splunk forwarder Status.
    debug:
       var: service_splunk_status.stdout_lines

  - name: Set fact splunkforwarder_installed
    set_fact:
      one_fact: splunkforwarder_installed

  - name: Enable Splunk forwarder service at boot (stop)
    command: /opt/splunkforwarder/bin/splunk stop
    timeout: 60

  - name: Enable Splunk forwarder service at boot (enable)
    command: /opt/splunkforwarder/bin/splunk enable boot-start
    timeout: 60

  - name: Enable Splunk forwarder service at boot (start)
    command: /opt/splunkforwarder/bin/splunk start
    timeout: 60
