---
- tasks:
    - name: Restart spooler service
      win_service:
        name: spooler
        state: restarted
      tags: spooler_restart

    - name: Set service spooler startup mode to auto and ensure it is started
      win_service:
        name: spooler
        start_mode: auto
        state: started
      tags: spooler_start

    - name: Pause netlogon service
      win_service:
        name: Netlogon
        state: paused
      tags: pause

    - name: Ensure that WinRM is delayed for system settling
      win_service:
        name: WinRM
        start_mode: delayed
      tags: delay
